name: malvoya_courier
description: Malvoya Courier - Premium Delivery App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  firebase_core: ^4.7.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1
  http: ^0.13.6
  intl: ^0.20.2
  provider: ^6.0.5
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
