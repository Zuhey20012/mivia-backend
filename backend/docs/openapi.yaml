openapi: 3.0.3
info:
  title: MIVIA Backend API
  version: "1.0.0"
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  uptime:
                    type: number
  /products:
    get:
      summary: List products
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
  /products/{id}:
    get:
      summary: Get product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
  /couriers:
    get:
      summary: List couriers
      responses:
        '200':
          description: Courier list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  couriers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Courier'
  /orders:
    post:
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewOrder'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
  /orders/{id}:
    get:
      summary: Get order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
components:
  schemas:
    Product:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: string }
        subCategory: { type: string, nullable: true }
        description: { type: string, nullable: true }
        price: { type: number }
        currency: { type: string }
        vendorId: { type: integer }
        variants:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              sku: { type: string }
              size: { type: string, nullable: true }
              stock: { type: integer }
    Courier:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        status: { type: string }
        lat: { type: number, nullable: true }
        lng: { type: number, nullable: true }
    NewOrder:
      type: object
      required: [ userId, items, total ]
      properties:
        userId: { type: integer }
        items:
          type: array
          items:
            type: object
            properties:
              productId: { type: integer }
              variantId: { type: integer, nullable: true }
              quantity: { type: integer }
        total: { type: number }
        type: { type: string, default: "purchase" }
    Order:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        items: { type: array, items: {} }
        total: { type: number }
        status: { type: string }
        courierId: { type: integer, nullable: true }
        etaMinutes: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
