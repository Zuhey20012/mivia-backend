services:
  - type: web
    name: malvoya-api
    env: node
    plan: free
    buildCommand: npm install --production && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: malvoya-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: malvoya-db
    databaseName: malvoya
    user: malvoya
    plan: free
