services:
  - type: web
    name: mivia-api
    env: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mivia-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mivia-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: NODE_ENV
        value: production

  - type: worker
    name: mivia-worker
    env: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: node dist/workers/assignmentWorker.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mivia-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mivia-redis
          property: connectionString
      - key: NODE_ENV
        value: production

  - type: redis
    name: mivia-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: mivia-db
    databaseName: mivia
    user: mivia
    plan: free
