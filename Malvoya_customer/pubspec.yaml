name: malvoya_customer
description: Malvoya - Premium Marketplace App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_map: ^4.0.0
  flutter_native_splash: ^2.4.7
  google_sign_in: ^6.2.1
  http: ^0.13.6
  intl: ^0.20.2
  latlong2: ^0.8.2
  provider: ^6.0.5
  shared_preferences: ^2.5.5
  sign_in_with_apple: ^7.0.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
